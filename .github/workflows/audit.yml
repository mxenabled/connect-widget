name: NPM Audit

on:
    pull_request:

jobs:
    NPM-Audit:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2
            - uses: actions/setup-node@v2
              with:
                  node-version: "lts/*"

            - name: Run npm audit
              run: npm audit --audit-level=high
