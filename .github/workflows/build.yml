name: Build

on: pull_request

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/Iron'
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
